# CareSyncAI V2 - AMD Developer Cloud / ROCm deployment
#
# This is an ADDITIVE compose file, not a replacement for docker-compose.yml:
# it reuses the same backend/frontend build contexts and adds the V2
# services (Qdrant, Ollama, Prometheus, Grafana) plus GPU device passthrough
# and the ROCm-based backend image. Run it standalone (it is fully
# self-contained) with:
#
#   docker compose -f docker-compose.amd.yml up -d
#
# No Kubernetes, no Helm, no Terraform - Docker Compose only, as required.
#
# GPU passthrough note: AMD Developer Cloud instances expose the GPU via
# /dev/kfd and /dev/dri (ROCm's device nodes), not via the NVIDIA Container
# Toolkit's `deploy.resources.reservations.devices` mechanism - hence the
# explicit `devices:` list on the backend service below instead of a
# `runtime: nvidia`-style block. On a box with no GPU, remove/comment the
# `devices:` block and `GPU_BACKEND=cpu` in the environment - the app
# detects the missing devices and falls back to CPU either way (see
# app/gpu/device_manager.py), this override is for explicitness in a
# GPU-guaranteed deployment.

version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gesturemed}
      POSTGRES_USER: ${POSTGRES_USER:-gesturemed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gesturemed_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gesturemed}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (vector store) ────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Ollama (free local LLM/embeddings) ──────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI, ROCm-enabled) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.amd
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gesturemed}:${POSTGRES_PASSWORD:-gesturemed_secret}@postgres:5432/${POSTGRES_DB:-gesturemed}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      GPU_ENABLED: "true"
      GPU_BACKEND: ${GPU_BACKEND:-rocm}
      RAG_ENABLE_PUBMED: "true"
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-llama3}
    ports:
      - "8000:8000"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    security_opt:
      - seccomp=unconfined
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads

  # ── Celery Worker (ROCm-enabled, same image as backend) ─────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.amd
    command: celery -A app.core.celery_app worker --loglevel=info -Q ai_reports,notifications
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gesturemed}:${POSTGRES_PASSWORD:-gesturemed_secret}@postgres:5432/${POSTGRES_DB:-gesturemed}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GPU_BACKEND: ${GPU_BACKEND:-rocm}
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  # ── Frontend (Next.js) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend

  # ── Prometheus ───────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  # ── Grafana ──────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  uploads_data:
  prometheus_data:
  grafana_data:
